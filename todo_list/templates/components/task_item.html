<div class="{% if task.completed %}task_completed{% else %}active_tasks{% endif %}">

    <!-- COMPLETE BUTTON -->
    <a href="{% url 'toggle_complete' task.id %}"
       class="task-circle {% if task.completed %}completed{% endif %}">
    </a>

    <!-- TITLE -->
    <span class="{% if task.completed %}completed-text{% else %}task-title{% endif %}">
        {{ task.title }}
    </span>

    <!-- STAR -->
    {% if task.important %}
        <a href="{% url 'toggle_important' task.id %}" class="task-star filled">★</a>
    {% else %}
        <a href="{% url 'toggle_important' task.id %}" class="task-star">☆</a>
    {% endif %}

    <!-- INFO -->
    <div class="task-info">
        <small>Created: {{ task.created_at|date:"M d, Y" }}</small>

        {% if task.due_date %}
            <small {% if not task.completed and task.due_date < today %}class="overdue"{% endif %}>
                Due: {{ task.due_date }}{% if not task.completed and task.due_date < today %} (overdue){% endif %}
            </small>
        {% endif %}
    </div>

    <!-- ACTIONS -->
    <div class="task-actions">

    <button 
        class="edit-button"
        data-task-id="{{ task.id }}">
        🖊
    </button>

        <form method="POST"
              action="{% url 'delete_task' task.id %}"
              style="display:inline;">

            {% csrf_token %}

            <button type="submit">
                x
            </button>

        </form>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="edit-modal-{{ task.id }}" class="modal">

    <div class="modal-content">

        <button type="button" class="close-edit-modal" data-task-id="{{ task.id }}">&times;</button>

        <h2>Edit Task</h2>

        <form method="POST" action="{% url 'edit_task' task.id %}">

            {% csrf_token %}

            <div class="form-group">
                <label for="edit-title-{{ task.id }}">Title:</label>
                <input type="text" id="edit-title-{{ task.id }}" name="title" value="{{ task.title }}">
            </div>

            <div class="form-group">
                <label for="edit-due-date-{{ task.id }}">Due date:</label>
                <input type="date" id="edit-due-date-{{ task.id }}" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}">
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" name="important" {% if task.important %}checked{% endif %}>
                    Important
                </label>
            </div>

            <button type="submit">
                Save Task
            </button>

        </form>

    </div>

</div>
